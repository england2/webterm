{{- if and .Values.manager.enabled .Values.manager.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "webterm.managerServiceAccountName" . }}
  labels:
    {{- include "webterm.componentLabels" (dict "root" . "component" "manager") | nindent 4 }}
  {{- with .Values.manager.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.manager.serviceAccount.automount }}
{{- end }}
