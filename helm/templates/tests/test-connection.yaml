{{- if .Values.webserver.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "webterm.webserverFullname" . }}-test-connection"
  labels:
    {{- include "webterm.componentLabels" (dict "root" . "component" "webserver") | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "webterm.webserverFullname" . }}:{{ .Values.webserver.service.port }}']
  restartPolicy: Never
{{- end }}
