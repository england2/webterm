{{- if and .Values.webserver.enabled .Values.webserver.testNodePort.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webterm.webserverTestNodePortFullname" . }}
  labels:
    {{- include "webterm.componentLabels" (dict "root" . "component" "webserver") | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.webserver.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- with .Values.webserver.testNodePort.nodePort }}
      nodePort: {{ . }}
      {{- end }}
  selector:
    {{- include "webterm.componentSelectorLabels" (dict "root" . "component" "webserver") | nindent 4 }}
{{- end }}
