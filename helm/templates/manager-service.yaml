{{- if .Values.manager.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webterm.managerFullname" . }}
  labels:
    {{- include "webterm.componentLabels" (dict "root" . "component" "manager") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.manager.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "webterm.componentSelectorLabels" (dict "root" . "component" "manager") | nindent 4 }}
{{- end }}
