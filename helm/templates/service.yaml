{{- if .Values.webserver.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webterm.webserverFullname" . }}
  labels:
    {{- include "webterm.componentLabels" (dict "root" . "component" "webserver") | nindent 4 }}
spec:
  type: {{ .Values.webserver.service.type }}
  ports:
    - port: {{ .Values.webserver.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "webterm.componentSelectorLabels" (dict "root" . "component" "webserver") | nindent 4 }}
{{- end }}
