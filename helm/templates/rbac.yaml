{{- if and .Values.manager.enabled .Values.manager.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "webterm.managerFullname" . }}
  labels:
    {{- include "webterm.componentLabels" (dict "root" . "component" "manager") | nindent 4 }}
rules:
  - apiGroups: ["", "apps"]
    resources: ["pods", "services", "statefulsets"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "webterm.managerFullname" . }}
  labels:
    {{- include "webterm.componentLabels" (dict "root" . "component" "manager") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "webterm.managerFullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "webterm.managerServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "webterm.managerFullname" . }}
  labels:
    {{- include "webterm.componentLabels" (dict "root" . "component" "manager") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "webterm.managerFullname" . }}
  labels:
    {{- include "webterm.componentLabels" (dict "root" . "component" "manager") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "webterm.managerFullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "webterm.managerServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
